<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BA8F5"/>
      <stop offset="0.55" stop-color="#3E7FE0"/>
      <stop offset="1" stop-color="#6FB0F0"/>
    </linearGradient>
    <linearGradient id="brandtext" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#2C5FB0"/>
      <stop offset="0.45" stop-color="#3E7FE0"/>
      <stop offset="1" stop-color="#5BA8F5"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1D9E75"/>
      <stop offset="1" stop-color="#3FC79A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#9DCBFB" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#9DCBFB" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="card" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0C2340" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background + aurora glow (mirrors the site hero) -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="210" r="300" fill="url(#glow1)" filter="url(#soft)"/>
  <circle cx="70" cy="610" r="300" fill="url(#glow2)" filter="url(#soft)"/>

  <!-- Header bar (same style as the site-header: light glass + hairline) -->
  <rect x="0" y="0" width="1200" height="80" fill="#EEF5FF" fill-opacity="0.85"/>
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#3E7FE0" stroke-opacity="0.10" stroke-width="1.5"/>
  <!-- brand -->
  <g transform="translate(85.6,21.6) scale(0.46)" fill="none" stroke-linecap="round">
    <path d="M40 4 A36 36 0 0 1 76 40" stroke="#3E7FE0" stroke-width="9"/>
    <path d="M40 76 A36 36 0 0 1 4 40" stroke="#5BA8F5" stroke-width="9"/>
    <circle cx="40" cy="4" r="7.5" fill="#1D9E75"/>
    <circle cx="40" cy="76" r="7.5" fill="#EF9F27"/>
  </g>
  <text x="138" y="51" font-size="30" font-weight="800" fill="url(#brandtext)" letter-spacing="-0.5">Odyssey</text>
  <!-- nav -->
  <g font-size="18" font-weight="600" fill="#5E7088" text-anchor="middle">
    <text x="648" y="46">How it works</text>
    <text x="752" y="46">Features</text>
    <text x="840" y="46">The app</text>
    <text x="910" y="46">Tech</text>
    <text x="985" y="46">Contact</text>
  </g>
  <rect x="1028" y="21" width="92" height="38" rx="19" fill="#3E7FE0"/>
  <text x="1074" y="46" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">GitHub</text>

  <!-- Launching soon pill -->
  <rect x="80" y="135" width="232" height="44" rx="22" fill="#ffffff" fill-opacity="0.18"
        stroke="#ffffff" stroke-opacity="0.30"/>
  <path d="M106 145 l3 9 l9 3 l-9 3 l-3 9 l-3 -9 l-9 -3 l9 -3 z" fill="#ffffff"/>
  <text x="128" y="164" font-size="21" font-weight="600" fill="#ffffff">Launching soon</text>

  <!-- Headline -->
  <g fill="#ffffff" font-weight="800" letter-spacing="-1.5">
    <text x="80" y="262" font-size="60">Book flights</text>
    <text x="80" y="336" font-size="60">&amp; hotels,</text>
    <text x="80" y="410" font-size="60">beautifully.</text>
  </g>
  <text x="82" y="464" font-size="25" fill="#ffffff" fill-opacity="0.92">Search, book real orders, and manage every trip.</text>

  <!-- Footer line -->
  <text x="82" y="560" font-size="27" font-weight="800" fill="#ffffff">odysseytrip.org</text>
  <text x="82" y="592" font-size="19" fill="#ffffff" fill-opacity="0.82">Powered by Amadeus</text>

  <!-- Flight result card -->
  <g filter="url(#card)">
    <rect x="700" y="180" width="420" height="150" rx="28" fill="#ffffff"/>
  </g>
  <line x1="845" y1="237" x2="948" y2="237" stroke="#3E7FE0" stroke-opacity="0.35"
        stroke-width="2" stroke-dasharray="2 6" stroke-linecap="round"/>
  <g transform="translate(876,218) scale(1.5) rotate(90 12 12)" fill="#3E7FE0">
    <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
  </g>
  <text x="735" y="255" font-size="42" font-weight="800" fill="#0C2340">HAN</text>
  <text x="965" y="255" font-size="42" font-weight="800" fill="#0C2340">SGN</text>
  <text x="735" y="305" font-size="22" fill="#5E7088">Mon, 22 Jun · nonstop</text>
  <text x="1085" y="305" font-size="32" font-weight="800" fill="#3E7FE0" text-anchor="end">$64</text>

  <!-- Booking confirmed card -->
  <g filter="url(#card)">
    <rect x="740" y="360" width="380" height="118" rx="26" fill="#ffffff"/>
  </g>
  <circle cx="800" cy="419" r="30" fill="url(#green)"/>
  <path d="M787 420 l9 9 l17 -20" fill="none" stroke="#ffffff" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <text x="852" y="413" font-size="25" font-weight="800" fill="#0C2340">Booking confirmed</text>
  <text x="852" y="443" font-size="18" fill="#5E7088">Ref · AMADEUS-7Q2K</text>
</svg>
